<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品カード</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:250px;
    background:#fff;
    border:1px solid #d9d9d9;
    border-radius:12px;
    overflow:hidden;
}

.card-image{
    width:100%;
    height:180px;
    background:#d9d9d9;
}

.card-body{
    padding:24px;
}

.card h2{
    font-size:24px;
    font-weight:700;
    color:#1e1e1e;
    margin-bottom:16px;
}

.description{
    font-size:16px;
    color:#757575;
    line-height:1.6;
    margin-bottom:24px;
}

.price{
    font-size:16px;
    font-weight:700;
    color:#e63946;
    margin-bottom:24px;
}

button{
    background:#2c2c2c;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:12px 24px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>

</head>
<body>

<div class="card">

    <div class="card-image"></div>

    <div class="card-body">

        <h2>ワイヤレスイヤホン</h2>

        <p class="description">
            軽量で長時間再生できる<br>
            Bluetoothイヤホン。
        </p>

        <p class="price">￥4,980</p>

        <button>購入する</button>

    </div>

</div>

</body>
</html>
